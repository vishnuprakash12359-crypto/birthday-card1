<!DOCTYPE html>
<html>
<head>
<title>Birthday Celebration</title>

<style>

 body{
margin:0;
overflow:hidden;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
font-family:Arial;
text-align:center;
color:white;
}
.light{
position:absolute;
width:8px;
height:8px;
background:white;
border-radius:50%;
opacity:0.8;
animation:moveLight 10s linear infinite;
}

@keyframes moveLight{
0%{
transform:translateY(0) translateX(0);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-1000px) translateX(200px);
opacity:0;
}
}
<div class="light" style="left:10%; animation-delay:0s;"></div>
<div class="light" style="left:25%; animation-delay:2s;"></div>
<div class="light" style="left:40%; animation-delay:4s;"></div>
<div class="light" style="left:55%; animation-delay:1s;"></div>
<div class="light" style="left:70%; animation-delay:3s;"></div>
<div class="light" style="left:85%; animation-delay:5s;"></div>

/* Cake */

#cake{
font-size:120px;
margin-top:40px;
}

/* Knife */

#knife{
font-size:60px;
cursor:pointer;
margin-top:20px;
}

/* Gift box */

#gift{
font-size:90px;
cursor:pointer;
display:none;
margin-top:20px;
}

/* Birthday card */

#card{
display:none;
background:white;
color:black;
padding:20px;
width:320px;
margin:auto;
border-radius:15px;
box-shadow:0 0 10px gray;
}

/* Balloons */

.balloon{
position:absolute;
bottom:-100px;
width:60px;
height:80px;
border-radius:50%;
animation:float linear forwards;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-1200px);}
}

/* Fireworks */

.particle{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1.6s forwards;
}

@keyframes explode{
0%{transform:translate(0,0);opacity:1;}
100%{transform:translate(var(--x),var(--y));opacity:0;}
}

img{
width:220px;
border-radius:20px;
}

</style>

</head>

<body>

<h1>🎉 Happy Birthday saro  🎂</h1>

<div id="cake">🎂</div>

<p>Click the knife to cut the cake</p>

<div id="knife">🔪</div>

<div id="gift">🎁</div>

<br>

<div id="card">

<h2>🎂 Birthday Wishes</h2>

<img src="https://uploads.onecompiler.io/44geg4vrh/44geh8xz2/IMG_20260315_115924.jpg">

<p>Wishing you a day filled with love, laughter, and all the things that make you happiest.!</p>

</div>

<!-- Music -->

<iframe width="0" height="0"
src="https://www.youtube.com/embed/90w2RegGf9w?autoplay=1&loop=1"
frameborder="0"
allow="autoplay">
</iframe>
<script>

/* Balloons */

function createBalloon(){

let balloon=document.createElement("div");

balloon.className="balloon";

balloon.style.left=Math.random()*100+"%";

balloon.style.background=
["red","yellow","blue","green","pink","orange"]
[Math.floor(Math.random()*6)];

balloon.style.animationDuration=6+Math.random()*4+"s";

document.body.appendChild(balloon);

setTimeout(()=>balloon.remove(),9000);

}

setInterval(createBalloon,1000);


/* Fireworks */

function firework(x,y){

for(let i=0;i<40;i++){

let p=document.createElement("div");

p.className="particle";

p.style.background=
["red","yellow","blue","green","purple","orange"]
[Math.floor(Math.random()*6)];

p.style.left=x+"px";
p.style.top=y+"px";

let angle=Math.random()*2*Math.PI;

let distance=120+Math.random()*80;

p.style.setProperty("--x",
Math.cos(angle)*distance+"px");

p.style.setProperty("--y",
Math.sin(angle)*distance+"px");

document.body.appendChild(p);

setTimeout(()=>p.remove(),1600);

}

}

/* Festival sky fireworks */

setInterval(()=>{

firework(
Math.random()*window.innerWidth,
Math.random()*window.innerHeight/2
);

},1200);


/* Cake cutting */

document.getElementById("knife").onclick=function(){

alert("🎂 Cake Cut! Celebration begins!");

firework(window.innerWidth/2,200);

document.getElementById("gift").style.display="block";

}

/* Gift reveal */

document.getElementById("gift").onclick=function(){

document.getElementById("card").style.display="block";

firework(window.innerWidth/2,200);

}


</script>

</body>
</html>
